<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #07070d;
            --bg-body: #0b0b16;
            --bg-card: #12121f;
            --bg-card-hover: #1a1a2e;
            --accent: #7c5cfc;
            --accent-soft: rgba(124, 92, 252, 0.12);
            --accent-glow: rgba(124, 92, 252, 0.2);
            --text-primary: #eaeaf0;
            --text-secondary: #6b6b8a;
            --text-muted: #4a4a66;
            --border-color: #1e1e36;
            --border-light: #2a2a4a;
            --success: #00d68f;
            --success-bg: rgba(0, 214, 143, 0.1);
            --danger: #ff4757;
            --danger-bg: rgba(255, 71, 87, 0.1);
            --warning: #ffd93d;
            --warning-bg: rgba(255, 217, 61, 0.1);
            --info: #54a0ff;
            --radius: 14px;
            --radius-sm: 8px;
            --shadow: 0 2px 20px rgba(0,0,0,0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-body);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            background-image: radial-gradient(ellipse at 50% 0%, rgba(124,92,252,0.04) 0%, transparent 70%);
        }

        .navbar {
            background: rgba(18, 18, 31, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            padding: 0.6rem 0;
            position: sticky;
            top: 0;
            z-index: 1030;
        }

        .navbar-brand {
            color: var(--accent);
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .navbar-brand .brand-icon {
            width: 32px;
            height: 32px;
            background: var(--accent-soft);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }

        .container-fluid { max-width: 1440px; }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .nav-actions .badge {
            background: var(--accent-soft);
            color: var(--accent);
            font-weight: 500;
            padding: 0.35rem 0.75rem;
            border-radius: 20px;
            border: 1px solid rgba(124,92,252,0.2);
            font-size: 0.8rem;
        }

        .btn-accent {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 0.45rem 1.1rem;
            border-radius: var(--radius-sm);
            font-weight: 500;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .btn-accent:hover {
            background: #8b6fff;
            color: #fff;
            transform: translateY(-1px);
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            padding: 0.45rem 1rem;
            border-radius: var(--radius-sm);
            font-weight: 500;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .btn-ghost:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-soft);
        }

        .lang-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 0.35rem 0.7rem;
            border-radius: 6px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        .lang-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-soft);
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .stat-item {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 1rem 1.25rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.2s;
        }

        .stat-item:hover {
            border-color: var(--border-light);
            box-shadow: var(--shadow);
        }

        .stat-item .stat-icon {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .stat-item .stat-icon.purple { background: var(--accent-soft); color: var(--accent); }
        .stat-item .stat-icon.green { background: var(--success-bg); color: var(--success); }
        .stat-item .stat-icon.red { background: var(--danger-bg); color: var(--danger); }
        .stat-item .stat-icon.yellow { background: var(--warning-bg); color: var(--warning); }

        .stat-item .stat-info .stat-label {
            color: var(--text-muted);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 600;
        }

        .stat-item .stat-info .stat-value {
            font-size: 1.2rem;
            font-weight: 700;
            line-height: 1.3;
        }

        #botList {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
            gap: 0.75rem;
        }

        @media (max-width: 480px) {
            #botList { grid-template-columns: 1fr; }
            .stats-bar { grid-template-columns: repeat(2, 1fr); }
            .nav-actions .btn span { display: none; }
        }

        .bot-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 1.15rem 1.25rem;
            transition: all 0.25s;
        }

        .bot-card.animate-in {
            animation: fadeUp 0.3s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bot-card:hover {
            border-color: var(--border-light);
            box-shadow: var(--shadow);
            background: var(--bg-card-hover);
        }

        .bot-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
        }

        .bot-header-left {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            min-width: 0;
        }

        .bot-status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .bot-status-dot.running { background: var(--success); box-shadow: 0 0 8px rgba(0,214,143,0.4); }
        .bot-status-dot.stopped { background: var(--danger); box-shadow: 0 0 8px rgba(255,71,87,0.3); }
        .bot-status-dot.error { background: var(--warning); box-shadow: 0 0 8px rgba(255,217,61,0.3); }

        .bot-name {
            font-size: 1.05rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .bot-header-right {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .source-badge {
            font-size: 0.6rem;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .source-template { background: var(--accent-soft); color: var(--accent); border: 1px solid rgba(124,92,252,0.25); }
        .source-imported { background: var(--success-bg); color: var(--success); border: 1px solid rgba(0,214,143,0.25); }

        .bot-meta {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            margin-bottom: 0.8rem;
        }

        .meta-chip {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 0.25rem 0.75rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        .meta-chip i { font-size: 0.7rem; }
        .meta-chip .chip-value { color: var(--text-primary); font-weight: 500; margin-left: 0.1rem; }
        .meta-chip .chip-value.green { color: var(--success); }
        .meta-chip .chip-value.yellow { color: var(--warning); }

        .bot-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.35rem;
            padding-top: 0.7rem;
            border-top: 1px solid var(--border-color);
        }

        .action-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 0.35rem 0.7rem;
            border-radius: 6px;
            font-size: 0.75rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            white-space: nowrap;
        }

        .action-btn i { font-size: 0.8rem; }

        .action-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-soft);
        }

        .action-btn.primary { border-color: rgba(124,92,252,0.3); color: var(--accent); }
        .action-btn.primary:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

        .action-btn.success { color: var(--success); }
        .action-btn.success:hover { border-color: var(--success); background: var(--success-bg); color: var(--success); }

        .action-btn.danger { color: var(--danger); }
        .action-btn.danger:hover { border-color: var(--danger); background: var(--danger-bg); color: var(--danger); }

        .action-btn.warning { color: var(--warning); }
        .action-btn.warning:hover { border-color: var(--warning); background: var(--warning-bg); color: var(--warning); }

        .action-btn.info { color: var(--info); }
        .action-btn.info:hover { border-color: var(--info); background: rgba(84,160,255,0.1); color: var(--info); }

        .action-btn.ghost { opacity: 0.6; }
        .action-btn.ghost:hover { opacity: 1; }

        .modal-content {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .modal-header {
            border-bottom: 1px solid var(--border-color);
            padding: 1.1rem 1.25rem;
        }

        .modal-header .modal-title {
            font-weight: 600;
            font-size: 1.05rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .modal-footer {
            border-top: 1px solid var(--border-color);
            padding: 1rem 1.25rem;
        }

        .modal-body { padding: 1.25rem; }

        .modal .btn-close { filter: invert(1) brightness(0.4); }

        .form-control, .form-select {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: var(--radius-sm);
            padding: 0.55rem 0.85rem;
            font-size: 0.9rem;
        }

        .form-control:focus, .form-select:focus {
            background: rgba(255,255,255,0.06);
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
            color: var(--text-primary);
        }

        .form-control::placeholder { color: var(--text-muted); }
        .form-label { color: var(--text-secondary); font-size: 0.8rem; font-weight: 500; margin-bottom: 0.35rem; }

        .form-check-input {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
        }
        .form-check-input:checked { background: var(--accent); border-color: var(--accent); }
        .form-check-input:focus { box-shadow: 0 0 0 3px var(--accent-soft); }

        .drop-zone {
            border: 2px dashed var(--border-color);
            border-radius: var(--radius-sm);
            padding: 1.75rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255,255,255,0.02);
        }

        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--accent);
            background: var(--accent-soft);
        }

        .drop-zone i { font-size: 1.8rem; color: var(--text-muted); margin-bottom: 0.4rem; }
        .drop-zone .file-name { font-size: 0.8rem; color: var(--accent); margin-top: 0.4rem; }

        .log-area {
            background: rgba(0,0,0,0.35);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 1rem;
            max-height: 450px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.78rem;
            line-height: 1.65;
            white-space: pre-wrap;
            color: var(--text-secondary);
        }

        .code-editor {
            background: rgba(0,0,0,0.35);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 1rem;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.82rem;
            line-height: 1.6;
            color: var(--text-primary);
            min-height: 320px;
            width: 100%;
            resize: vertical;
        }

        .toast-container {
            position: fixed;
            bottom: 1.25rem;
            right: 1.25rem;
            z-index: 1060;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .toast {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: var(--radius-sm);
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            min-width: 280px;
            animation: slideIn 0.25s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .toast .toast-body {
            padding: 0.75rem 1rem;
            font-size: 0.85rem;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 5rem 2rem;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 3.5rem;
            margin-bottom: 1.2rem;
            color: var(--text-muted);
        }

        .empty-state h5 {
            color: var(--text-primary);
            font-weight: 600;
            margin-bottom: 0.4rem;
        }

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        .modal-dialog-scrollable .modal-body::-webkit-scrollbar { width: 4px; }

        .btn-secondary-ghost {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 0.45rem 1.1rem;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .btn-secondary-ghost:hover {
            border-color: var(--text-muted);
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container-fluid">
            <span class="navbar-brand">
                <span class="brand-icon"><i class="bi bi-robot"></i></span>
                Bot Manager
            </span>
            <div class="nav-actions">
                <span class="badge" id="botCount">0 bots</span>
                <button class="lang-btn" id="langToggle" onclick="toggleLang()">TR</button>
                <button class="btn-ghost" onclick="showImportModal()">
                    <i class="bi bi-upload"></i> <span data-i18n="importBotBtn">Import</span>
                </button>
                <button class="btn-ghost" onclick="showCloneModal()">
                    <i class="bi bi-github"></i> <span data-i18n="cloneBtn">Clone</span>
                </button>
                <button class="btn-accent" onclick="showCreateModal()">
                    <i class="bi bi-plus-lg"></i> <span data-i18n="newBotBtn">New Bot</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-3">
        <div class="stats-bar" id="statsBar">
            <div class="stat-item">
                <div class="stat-icon purple"><i class="bi bi-boxes"></i></div>
                <div class="stat-info">
                    <div class="stat-label" data-i18n="totalBots">TOTAL BOTS</div>
                    <div class="stat-value" id="totalBots">0</div>
                </div>
            </div>
            <div class="stat-item">
                <div class="stat-icon green"><i class="bi bi-play-circle"></i></div>
                <div class="stat-info">
                    <div class="stat-label" data-i18n="active">ACTIVE</div>
                    <div class="stat-value" id="activeBots">0</div>
                </div>
            </div>
            <div class="stat-item">
                <div class="stat-icon red"><i class="bi bi-stop-circle"></i></div>
                <div class="stat-info">
                    <div class="stat-label" data-i18n="stopped">STOPPED</div>
                    <div class="stat-value" id="stoppedBots">0</div>
                </div>
            </div>
            <div class="stat-item">
                <div class="stat-icon yellow"><i class="bi bi-memory"></i></div>
                <div class="stat-info">
                    <div class="stat-label" data-i18n="totalRam">TOTAL RAM</div>
                    <div class="stat-value" id="totalRam">0 MB</div>
                </div>
            </div>
        </div>

        <div id="botList"></div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <!-- Create Modal -->
    <div class="modal fade" id="createModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-plus-circle"></i><span data-i18n="createTitle">Create New Bot</span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label" data-i18n="botName">Bot Name</label>
                        <input type="text" class="form-control" id="newBotName" placeholder="e.g. moderation-bot">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" data-i18n="botToken">Discord Bot Token</label>
                        <input type="password" class="form-control" id="newBotToken" placeholder="MTE4...">
                        <div class="form-text" style="color: var(--text-muted); font-size: 0.72rem;" data-i18n="tokenSafe">Your token is safe, stored locally only.</div>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="autoStartCheck">
                        <label class="form-check-label" style="color: var(--text-secondary); font-size: 0.85rem;" data-i18n="autoStart">Auto start after creation</label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn-secondary-ghost" data-bs-dismiss="modal" data-i18n="cancel">Cancel</button>
                    <button class="btn btn-accent" onclick="createBot()" data-i18n="create">Create</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Clone Modal -->
    <div class="modal fade" id="cloneModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-github"></i><span data-i18n="cloneTitle">Clone from GitHub</span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label" data-i18n="botName">Bot Name</label>
                        <input type="text" class="form-control" id="cloneBotName" placeholder="e.g. my-github-bot">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" data-i18n="repoUrl">GitHub Repository URL</label>
                        <input type="text" class="form-control" id="cloneRepoUrl" placeholder="https://github.com/user/repo.git">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" data-i18n="botTokenOptional">Discord Bot Token (optional)</label>
                        <input type="password" class="form-control" id="cloneBotToken" placeholder="MTE4...">
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="cloneAutoStart">
                        <label class="form-check-label" style="color: var(--text-secondary); font-size: 0.85rem;" data-i18n="autoStart">Auto start after creation</label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn-secondary-ghost" data-bs-dismiss="modal" data-i18n="cancel">Cancel</button>
                    <button class="btn btn-accent" onclick="cloneBot()" data-i18n="cloneBtn">Clone</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Logs Modal -->
    <div class="modal fade" id="logsModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-journal-text"></i><span id="logsModalTitle"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="log-area" id="logsContent"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-code-slash"></i><span id="editModalTitle"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <textarea class="code-editor" id="codeEditor" spellcheck="false"></textarea>
                </div>
                <div class="modal-footer">
                    <button class="btn-secondary-ghost" data-bs-dismiss="modal" data-i18n="cancel">Cancel</button>
                    <button class="btn btn-accent" onclick="saveEdit()" data-i18n="save">Save</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Import Modal -->
    <div class="modal fade" id="importModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-upload"></i><span data-i18n="importTitle">Import Bot</span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label" data-i18n="botName">Bot Name</label>
                        <input type="text" class="form-control" id="importBotName" placeholder="e.g. my-custom-bot">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" data-i18n="importBotFile">Bot Python File (.py)</label>
                        <div class="drop-zone" id="importDropZone" onclick="document.getElementById('importBotFile').click()">
                            <i class="bi bi-cloud-upload"></i>
                            <div data-i18n="dropHere">Drop .py file here or click to browse</div>
                            <div class="file-name" id="importFileName"></div>
                        </div>
                        <input type="file" class="d-none" id="importBotFile" accept=".py" onchange="updateFileName(this, 'importFileName')">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" data-i18n="importReqFile">Requirements File (optional, .txt)</label>
                        <div class="drop-zone" id="reqDropZone" onclick="document.getElementById('importReqFile').click()" style="padding: 1rem;">
                            <div data-i18n="dropHereReq">Drop .txt or click to browse</div>
                            <div class="file-name" id="reqFileName"></div>
                        </div>
                        <input type="file" class="d-none" id="importReqFile" accept=".txt" onchange="updateFileName(this, 'reqFileName')">

                    <div class="mb-3">
                        <label class="form-label" data-i18n="botTokenOptional">Discord Bot Token (optional)</label>
                        <input type="password" class="form-control" id="importBotToken" placeholder="MTE4...">
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn-secondary-ghost" data-bs-dismiss="modal" data-i18n="cancel">Cancel</button>
                    <button class="btn btn-accent" onclick="importBot()" data-i18n="importBtn">Import</button>
                </div>
            </div>
        </div>
    </div>

        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-arrow-repeat"></i><span id="replaceModalTitle"></span></h5>

                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label" data-i18n="importBotFile">Bot Python File (.py)</label>

                            <div data-i18n="dropHere">Drop .py file here or click to browse</div>
                            <div class="file-name" id="replaceFileName"></div>

                        <label class="form-label" data-i18n="importReqFile">Requirements File (optional, .txt)</label>
                        <div class="drop-zone" onclick="document.getElementById('replaceReqFile').click()" style="padding: 1rem;">
                            <div data-i18n="dropHereReq">Drop .txt or click to browse</div>
                            <div class="file-name" id="replaceReqFileName"></div>
                        </div>
                        <input type="file" class="d-none" id="replaceReqFile" accept=".txt" onchange="updateFileName(this, 'replaceReqFileName')">

                        <label class="form-label" data-i18n="botTokenOptional">Discord Bot Token (optional)</label>

                <div class="modal-footer">
                    <button class="btn-secondary-ghost" data-bs-dismiss="modal" data-i18n="cancel">Cancel</button>

                dropHere: '.py dosyas\u0131n\u0131 buraya b\u0131rak\u0131n veya t\u0131klay\u0131n',

                createFirst: '\u0130lk Botu Olu\u015ftur',
                failedLoadBots: 'Botlar y\u00fcklenirken hata olu\u015ftu',
                actionFailed: '\u0130\u015flem ba\u015far\u0131s\u0131z',

                nameAndRepoRequired: '\u0130sim ve repo URL\'si gerekli',
                failedCreateBot: 'Bot olu\u015fturulamad\u0131',

                commitMsg: 'Commit mesaj\u0131 (opsiyonel):',
                confirmDelete: '"{name}" botunu silmek istedi\u011finize emin misiniz?',
                botCount: '{n} bot',
                day: 'g',
                hour: 's',
                min: 'd',
                sec: 'sn',
                pid: 'PID',

                cloneTitle: 'GitHub\'dan Klonla',
                repoUrl: 'GitHub Depo URL\'si',
                autoGitPull: 'Oto Pull',
                sourceCloned: 'KLONLANDI',
                pidLabel: 'PID',
            }
        };

        let currentLang = localStorage.getItem('botManagerLang') || 'en';
        let currentBot = null;
        let botsData = {};

        function t(key, vars = {}) {
            let val = LANG[currentLang][key] || LANG['en'][key] || key;
            for (const [k, v] of Object.entries(vars)) {
                val = val.replace(`{${k}}`, v);
            }
            return val;
        }

        function applyLang() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                el.textContent = t(key);
            });
            document.getElementById('langToggle').textContent = currentLang === 'en' ? 'TR' : 'EN';
            if (Object.keys(botsData).length > 0) renderBots(botsData);
            const empty = document.querySelector('.empty-state');
            if (empty) renderBots(botsData);
        }

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'tr' : 'en';
            localStorage.setItem('botManagerLang', currentLang);
            applyLang();
            updateDynamicTexts();
        }

        function updateDynamicTexts() {
            const names = Object.keys(botsData);
            document.getElementById('botCount').textContent = t('botCount', { n: names.length });
            const emptyTitle = document.querySelector('.empty-state h5');
            const emptyDesc = document.querySelector('.empty-state p');
            const emptyBtn = document.querySelector('.empty-state .btn');
            if (emptyTitle) emptyTitle.textContent = t('noBots');
            if (emptyDesc) emptyDesc.textContent = t('noBotsDesc');
            if (emptyBtn) emptyBtn.innerHTML = `<i class="bi bi-plus-lg"></i> ${t('createFirst')}`;
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const colors = { success: 'var(--success)', error: 'var(--danger)', warning: 'var(--warning)' };
            const icons = { success: 'bi-check-circle', error: 'bi-x-circle', warning: 'bi-exclamation-triangle' };
            const toast = document.createElement('div');
            toast.className = 'toast show';
            toast.innerHTML = `
                <div class="toast-body d-flex align-items-center gap-2">
                    <i class="bi ${icons[type] || icons.success}" style="color: ${colors[type] || colors.success}"></i>
                    <span>${message}</span>
                    <button type="button" class="btn-close btn-close-white ms-auto" onclick="this.parentElement.parentElement.remove()"></button>
                </div>
            `;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        function formatUptime(seconds) {
            if (!seconds) return '-';
            const d = Math.floor(seconds / 86400);
            const h = Math.floor((seconds % 86400) / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            const parts = [];
            if (d > 0) parts.push(d + t('day'));
            if (h > 0) parts.push(h + t('hour'));
            if (m > 0) parts.push(m + t('min'));
            parts.push(s + t('sec'));
            return parts.join(' ');
        }

        function formatBytes(mb) {
            if (mb == null) return '-';
            if (mb < 1) return (mb * 1024).toFixed(0) + ' KB';
            return mb.toFixed(1) + ' MB';
        }

        function esc(str) {
            return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        }

        function getSourceBadge(source) {
            if (source === 'imported') return `<span class="source-badge source-imported">${t('sourceImported')}</span>`;
            if (source === 'cloned') return `<span class="source-badge source-imported">${t('sourceCloned')}</span>`;
            return `<span class="source-badge source-template">${t('sourceTemplate')}</span>`;
        }

        function updateFileName(input, displayId) {
            const name = input.files[0] ? input.files[0].name : '';
            document.getElementById(displayId).textContent = name;
        }

        function setupDropZone(zoneId, inputId) {
            const zone = document.getElementById(zoneId);
            const input = document.getElementById(inputId);
            if (!zone || !input) return;
            zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
            zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
            zone.addEventListener('drop', e => {
                e.preventDefault();
                zone.classList.remove('dragover');
                if (e.dataTransfer.files.length) {
                    input.files = e.dataTransfer.files;
                    const map = { importDropZone: 'importFileName', replaceDropZone: 'replaceFileName', reqDropZone: 'reqFileName' };
                    updateFileName(input, map[zoneId] || 'fileName');
                }
            });
        }

        let _initialRender = true;

        function renderBots(bots) {
            botsData = bots;
            const container = document.getElementById('botList');
            const names = Object.keys(bots);

            let totalRam = 0, active = 0, stopped = 0;
            names.forEach(n => {
                const b = bots[n];
                if (!b) return;
                totalRam += b.memory_mb || 0;
                if (b.status === 'running') active++;
                else if (b.status === 'stopped') stopped++;
            });

            document.getElementById('totalBots').textContent = names.length;
            document.getElementById('activeBots').textContent = active;
            document.getElementById('stoppedBots').textContent = stopped;
            document.getElementById('totalRam').textContent = totalRam.toFixed(1) + ' MB';
            document.getElementById('botCount').textContent = t('botCount', { n: names.length });

            if (names.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-robot"></i>
                        <h5>${t('noBots')}</h5>
                        <p class="text-secondary">${t('noBotsDesc')}</p>
                        <button class="btn btn-accent" onclick="showCreateModal()">
                            <i class="bi bi-plus-lg"></i> ${t('createFirst')}
                        </button>
                    </div>
                `;
                _initialRender = true;
                return;
            }

            const animate = _initialRender;
            _initialRender = false;

            let html = '';
            names.forEach(name => {
                const b = bots[name];
                if (!b) return;
                const status = b.status || 'stopped';
                const dotClass = status === 'running' ? 'running' : status === 'stopped' ? 'stopped' : 'error';
                const sName = esc(name);
                html += `
                    <div class="bot-card${animate ? ' animate-in' : ''}" id="bot-${sName}">
                        <div class="bot-header">
                            <div class="bot-header-left">
                                <span class="bot-status-dot ${dotClass}"></span>
                                <span class="bot-name">${name}</span>
                                ${getSourceBadge(b.source)}
                            </div>
                            <div class="bot-header-right">
                                <small style="color: var(--text-muted); font-size: 0.7rem;">${t('pidLabel')}: ${b.pid || '-'}</small>
                            </div>
                        </div>
                        <div class="bot-meta">
                            <span class="meta-chip"><i class="bi bi-memory"></i> ${t('ram')} <span class="chip-value ${status === 'running' ? 'green' : ''}">${formatBytes(b.memory_mb)}</span></span>
                            <span class="meta-chip"><i class="bi bi-cpu"></i> ${t('cpu')} <span class="chip-value">${b.cpu_percent != null ? b.cpu_percent.toFixed(1) + '%' : '-'}</span></span>
                            <span class="meta-chip"><i class="bi bi-hdd"></i> ${t('storage')} <span class="chip-value">${formatBytes(b.storage_mb)}</span></span>
                            <span class="meta-chip"><i class="bi bi-clock-history"></i> ${t('uptime')} <span class="chip-value">${formatUptime(b.uptime_seconds)}</span></span>
                            <span class="meta-chip"><i class="bi bi-tag"></i> ${t('status').toUpperCase()} <span class="chip-value ${status === 'running' ? 'green' : status === 'stopped' ? '' : 'yellow'}">${status === 'running' ? t('running') : status === 'stopped' ? t('stopped_status') : t('error')}</span></span>
                        </div>
                        <div class="bot-actions">
                            ${status === 'running'
                                ? `<button class="action-btn warning" onclick="actionBot('${sName}', 'restart')"><i class="bi bi-arrow-repeat"></i> ${t('restart')}</button>
                                   <button class="action-btn danger" onclick="actionBot('${sName}', 'stop')"><i class="bi bi-stop-fill"></i> ${t('stop')}</button>`
                                : `<button class="action-btn success" onclick="actionBot('${sName}', 'start')"><i class="bi bi-play-fill"></i> ${t('start')}</button>`
                            }
                            <button class="action-btn" onclick="showLogs('${sName}')"><i class="bi bi-journal-text"></i> ${t('logsBtn')}</button>
                            <button class="action-btn" onclick="showEdit('${sName}')"><i class="bi bi-pencil"></i> ${t('edit')}</button>
                            <button class="action-btn" onclick="showReplaceFile('${sName}')"><i class="bi bi-upload"></i> ${t('replaceFile')}</button>
                            <button class="action-btn" onclick="showEnv('${sName}')"><i class="bi bi-key"></i> ${t('token')}</button>
                            <button class="action-btn" onclick="gitPush('${sName}')"><i class="bi bi-arrow-up"></i> ${t('gitPush')}</button>
                            <button class="action-btn" onclick="gitPull('${sName}')"><i class="bi bi-arrow-down"></i> ${t('gitPull')}</button>
                            <button class="action-btn ghost" id="autoGitPullBtn-${sName}" onclick="toggleAutoGitPull('${sName}')" style="opacity: ${b.auto_git_pull ? '1' : '0.4'}"><i class="bi bi-arrow-repeat"></i> ${t('autoGitPull')}</button>
                            ${b.token ? `<button class="action-btn info" onclick="addToServer('${sName}')"><i class="bi bi-box-arrow-up-right"></i> ${t('addToServer')}</button>` : ''}
                            <button class="action-btn danger" onclick="deleteBot('${sName}')"><i class="bi bi-trash"></i> ${t('delete')}</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function loadBots() {
            fetch('/api/bots')
                .then(r => r.json())
                .then(data => renderBots(data.bots || {}))
                .catch(() => showToast(t('failedLoadBots'), 'error'));
        }

        function actionBot(name, action) {
            fetch(`/api/bots/${name}/${action}`, { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    showToast(data.message, data.success ? 'success' : 'error');
                    if (data.success) loadBots();
                })
                .catch(() => showToast(t('actionFailed'), 'error'));
        }

        function showCreateModal() {
            document.getElementById('newBotName').value = '';
            document.getElementById('newBotToken').value = '';
            document.getElementById('autoStartCheck').checked = false;
            new bootstrap.Modal(document.getElementById('createModal')).show();
        }

        function createBot() {
            const name = document.getElementById('newBotName').value.trim();
            const token = document.getElementById('newBotToken').value.trim();
            const autoStart = document.getElementById('autoStartCheck').checked;
            if (!name || !token) {
                showToast(t('nameTokenRequired'), 'error');
                return;
            }
            fetch('/api/bots', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, token, auto_start: autoStart })
            })
                .then(r => r.json())
                .then(data => {
                    showToast(data.message, data.success ? 'success' : 'error');
                    if (data.success) {
                        bootstrap.Modal.getInstance(document.getElementById('createModal')).hide();
                        loadBots();
                    }
                })
                .catch(() => showToast(t('failedCreateBot'), 'error'));
        }

        function deleteBot(name) {
            if (!confirm(t('confirmDelete', { name }))) return;
            fetch(`/api/bots/${name}`, { method: 'DELETE' })
                .then(r => r.json())
                .then(data => {
                    showToast(data.message, data.success ? 'success' : 'error');
                    if (data.success) loadBots();
                });
        }

        function showLogs(name) {
            document.getElementById('logsModalTitle').textContent = `${name} - ${t('logs')}`;
            document.getElementById('logsContent').textContent = t('loading');
            const modal = new bootstrap.Modal(document.getElementById('logsModal'));
            modal.show();
            fetch(`/api/bots/${name}/logs?lines=100`)
                .then(r => r.json())
                .then(data => {
                    const logs = data.logs || [];
                    document.getElementById('logsContent').textContent = logs.join('\n') || t('noLogs');
                })
                .catch(() => document.getElementById('logsContent').textContent = t('failedLoadLogs'));
        }

        function showEdit(name) {
            currentBot = name;
            document.getElementById('editModalTitle').textContent = `${name} - ${t('editCode')}`;
            document.getElementById('codeEditor').value = t('loading');
            const modal = new bootstrap.Modal(document.getElementById('editModal'));
            modal.show();
            fetch(`/api/bots/${name}/edit`)
                .then(r => r.json())
                .then(data => {
                    document.getElementById('codeEditor').value = data.content || '';
                })
                .catch(() => {
                    document.getElementById('codeEditor').value = t('failedLoadCode');
                });
        }

        function saveEdit() {
            if (!currentBot) return;
            const content = document.getElementById('codeEditor').value;
            fetch(`/api/bots/${currentBot}/edit`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content })
            })
                .then(r => r.json())
                .then(data => {
                    showToast(data.message, data.success ? 'success' : 'error');
                    if (data.success) bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
                });
        }

        function showEnv(name) {
            currentBot = name;
            document.getElementById('envModalTitle').textContent = `${name} - ${t('editToken')}`;
            document.getElementById('editToken').value = '';
            new bootstrap.Modal(document.getElementById('envModal')).show();
        }

        function saveEnv() {
            if (!currentBot) return;
            const token = document.getElementById('editToken').value.trim();
            if (!token) { showToast(t('tokenRequired'), 'error'); return; }
            fetch(`/api/bots/${currentBot}/env`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token })
            })
                .then(r => r.json())
                .then(data => {
                    showToast(data.message, data.success ? 'success' : 'error');
                    if (data.success) bootstrap.Modal.getInstance(document.getElementById('envModal')).hide();
                });
        }

        function showImportModal() {
            document.getElementById('importBotName').value = '';
            document.getElementById('importBotToken').value = '';
            document.getElementById('importBotFile').value = '';
            document.getElementById('importReqFile').value = '';
            new bootstrap.Modal(document.getElementById('importModal')).show();
        }

        function importBot() {
            const name = document.getElementById('importBotName').value.trim();
            const token = document.getElementById('importBotToken').value.trim();
            const botFile = document.getElementById('importBotFile').files[0];
            const reqFile = document.getElementById('importReqFile').files[0];

            if (!name || !botFile) {
                showToast(t('nameTokenRequired'), 'error');
                return;
            }

            const formData = new FormData();
            formData.append('name', name);
            formData.append('token', token);
            formData.append('bot_file', botFile);
            if (reqFile) formData.append('req_file', reqFile);

            fetch('/api/bots/import', {
                method: 'POST',
                body: formData
            })
                .then(r => r.json())
                .then(data => {
                    showToast(data.message, data.success ? 'success' : 'error');
                    if (data.success) {
                        bootstrap.Modal.getInstance(document.getElementById('importModal')).hide();
                        loadBots();
                    }
                })
                .catch(() => showToast(t('failedCreateBot'), 'error'));
        }

        function showReplaceFile(name) {
            currentBot = name;
            document.getElementById('replaceModalTitle').textContent = `${name} - ${t('replaceFile')}`;
            document.getElementById('replaceBotToken').value = '';
            document.getElementById('replaceBotFile').value = '';
            document.getElementById('replaceReqFile').value = '';
            document.getElementById('replaceFileName').textContent = '';
            document.getElementById('replaceReqFileName').textContent = '';
            new bootstrap.Modal(document.getElementById('replaceFileModal')).show();
        }

        function replaceBotFile() {
            if (!currentBot) return;
            const token = document.getElementById('replaceBotToken').value.trim();
            const botFile = document.getElementById('replaceBotFile').files[0];
            const reqFile = document.getElementById('replaceReqFile').files[0];

            if (!botFile) {
                showToast(t('nameTokenRequired'), 'error');
                return;
            }

            const formData = new FormData();
            formData.append('token', token);
            formData.append('bot_file', botFile);
            if (reqFile) formData.append('req_file', reqFile);

            fetch(`/api/bots/${currentBot}/replace-file`, {
                method: 'POST',
                body: formData
            })
                .then(r => r.json())
                .then(data => {
                    showToast(data.message, data.success ? 'success' : 'error');
                    if (data.success) {
                        bootstrap.Modal.getInstance(document.getElementById('replaceFileModal')).hide();
                        loadBots();
                    }
                })
                .catch(() => showToast(t('actionFailed'), 'error'));
        }

        function addToServer(name) {
            fetch(`/api/bots/${name}/invite`)
                .then(r => r.json())
                .then(data => {
                    if (data.url) {
                        window.open(data.url, '_blank');
                    } else {
                        showToast(data.error || 'Failed to generate invite link', 'error');
                    }
                })
                .catch(() => showToast(t('actionFailed'), 'error'));
        }

        function gitPull(name) {
            fetch(`/api/bots/${name}/git-pull`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: '{}'
            })
                .then(r => r.json())
                .then(data => showToast(data.message, data.success ? 'success' : 'error'));
        }

        function gitPush(name) {
            const msg = prompt(t('commitMsg'));
            const body = msg ? JSON.stringify({ message: msg }) : '{}';
            fetch(`/api/bots/${name}/git-push`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body
            })
                .then(r => r.json())
                .then(data => showToast(data.message, data.success ? 'success' : 'error'));
        }

        function showCloneModal() {
            document.getElementById('cloneBotName').value = '';
            document.getElementById('cloneRepoUrl').value = '';
            document.getElementById('cloneBotToken').value = '';
            document.getElementById('cloneAutoStart').checked = false;
            new bootstrap.Modal(document.getElementById('cloneModal')).show();
        }

        function cloneBot() {
            const name = document.getElementById('cloneBotName').value.trim();
            const repoUrl = document.getElementById('cloneRepoUrl').value.trim();
            const token = document.getElementById('cloneBotToken').value.trim();
            const autoStart = document.getElementById('cloneAutoStart').checked;

            if (!name || !repoUrl) {
                showToast(t('nameAndRepoRequired'), 'error');
                return;
            }

            fetch('/api/bots/clone', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, repo_url: repoUrl, token, auto_start: autoStart })
            })
                .then(r => r.json())
                .then(data => {
                    showToast(data.message, data.success ? 'success' : 'error');
                    if (data.success) {
                        bootstrap.Modal.getInstance(document.getElementById('cloneModal')).hide();
                        loadBots();
                    }
                })
                .catch(() => showToast(t('actionFailed'), 'error'));
        }

        function toggleAutoGitPull(name) {
            const current = botsData[name]?.auto_git_pull || false;
            const enabled = !current;
            fetch(`/api/bots/${name}/auto-git-pull`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ enabled })
            })
                .then(r => r.json())
                .then(data => {
                    showToast(data.message, data.success ? 'success' : 'error');
                    if (data.success) loadBots();
                })
                .catch(() => showToast(t('actionFailed'), 'error'));
        }

        applyLang();
        setupDropZone('importDropZone', 'importBotFile');
        setupDropZone('reqDropZone', 'importReqFile');
        setupDropZone('replaceDropZone', 'replaceBotFile');
        loadBots();
        setInterval(loadBots, 5000);
    </script>
</body>
</html>
