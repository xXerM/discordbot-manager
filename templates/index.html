<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f0f1a;
            --bg-card: #1a1a2e;
            --bg-card-hover: #222244;
            --accent: #6c5ce7;
            --accent-glow: rgba(108, 92, 231, 0.15);
            --text-primary: #e8e8f0;
            --text-secondary: #8888aa;
            --border-color: #2a2a4a;
            --success: #00d68f;
            --danger: #ff6b6b;
            --warning: #ffd93d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        .navbar {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 0.75rem 0;
        }

        .navbar-brand {
            color: var(--accent);
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: -0.5px;
        }

        .navbar-brand i { margin-right: 8px; }

        .navbar .badge {
            background: var(--accent);
            color: white;
            font-weight: 500;
        }

        .container-fluid { max-width: 1400px; }

        .btn-accent {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-accent:hover {
            background: #7c6cf7;
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn-outline-accent {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
        }

        .btn-outline-accent:hover {
            background: var(--accent);
            color: white;
        }

        .btn-sm { padding: 0.3rem 0.8rem; font-size: 0.85rem; }

        .stats-bar {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.2rem 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .stat-item i {
            font-size: 1.5rem;
            color: var(--accent);
        }

        .stat-item .stat-label {
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-item .stat-value {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .bot-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.25rem;
            transition: all 0.2s;
            margin-bottom: 1rem;
        }

        .bot-card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .bot-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .bot-name {
            font-size: 1.15rem;
            font-weight: 600;
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .status-running {
            background: rgba(0, 214, 143, 0.1);
            color: var(--success);
            border: 1px solid rgba(0, 214, 143, 0.3);
        }

        .status-stopped {
            background: rgba(255, 107, 107, 0.1);
            color: var(--danger);
            border: 1px solid rgba(255, 107, 107, 0.3);
        }

        .status-error {
            background: rgba(255, 217, 61, 0.1);
            color: var(--warning);
            border: 1px solid rgba(255, 217, 61, 0.3);
        }

        .bot-metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 0.75rem;
            margin: 0.75rem 0;
        }

        .metric {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 0.5rem 0.75rem;
            text-align: center;
        }

        .metric .metric-value {
            font-size: 1rem;
            font-weight: 600;
        }

        .metric .metric-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .bot-actions {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border-color);
        }

        .action-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 0.35rem 0.7rem;
            border-radius: 6px;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .action-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-glow);
        }

        .action-btn.text-danger:hover {
            border-color: var(--danger);
            color: var(--danger);
            background: rgba(255, 107, 107, 0.1);
        }

        .action-btn.text-success:hover {
            border-color: var(--success);
            color: var(--success);
            background: rgba(0, 214, 143, 0.1);
        }

        .action-btn.text-warning:hover {
            border-color: var(--warning);
            color: var(--warning);
            background: rgba(255, 217, 61, 0.1);
        }

        .modal-content {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .modal-header {
            border-bottom: 1px solid var(--border-color);
        }

        .modal-footer {
            border-top: 1px solid var(--border-color);
        }

        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 8px;
        }

        .form-control:focus, .form-select:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-glow);
            color: var(--text-primary);
        }

        .form-control::placeholder {
            color: var(--text-secondary);
        }

        .form-label { color: var(--text-secondary); font-size: 0.85rem; }

        .modal .btn-close {
            filter: invert(1) brightness(0.5);
        }

        .log-area {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.8rem;
            line-height: 1.6;
            white-space: pre-wrap;
            color: var(--text-secondary);
        }

        .code-editor {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.85rem;
            line-height: 1.6;
            color: var(--text-primary);
            min-height: 300px;
            width: 100%;
            resize: vertical;
        }

        .toast-container {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            z-index: 1060;
        }

        .toast {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container-fluid">
            <span class="navbar-brand"><i class="bi bi-robot"></i> Bot Manager</span>
            <div class="d-flex align-items-center gap-3">
                <span class="badge" id="botCount">0 bot</span>
                <button class="btn btn-accent btn-sm" onclick="showCreateModal()">
                    <i class="bi bi-plus-lg"></i> Yeni Bot
                </button>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-3">
        <div class="stats-bar" id="statsBar">
            <div class="stat-item">
                <i class="bi bi-boxes"></i>
                <div>
                    <div class="stat-label">Toplam Bot</div>
                    <div class="stat-value" id="totalBots">0</div>
                </div>
            </div>
            <div class="stat-item">
                <i class="bi bi-play-circle" style="color: var(--success);"></i>
                <div>
                    <div class="stat-label">Aktif</div>
                    <div class="stat-value" id="activeBots">0</div>
                </div>
            </div>
            <div class="stat-item">
                <i class="bi bi-stop-circle" style="color: var(--danger);"></i>
                <div>
                    <div class="stat-label">Durduruldu</div>
                    <div class="stat-value" id="stoppedBots">0</div>
                </div>
            </div>
            <div class="stat-item">
                <i class="bi bi-memory" style="color: var(--warning);"></i>
                <div>
                    <div class="stat-label">Toplam RAM</div>
                    <div class="stat-value" id="totalRam">0 MB</div>
                </div>
            </div>
        </div>

        <div id="botList"></div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <div class="modal fade" id="createModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-plus-circle me-2"></i>Yeni Bot Oluştur</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Bot Adı</label>
                        <input type="text" class="form-control" id="newBotName" placeholder="ör: moderasyon-botu">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Discord Bot Tokeni</label>
                        <input type="password" class="form-control" id="newBotToken" placeholder="MTE4...">
                        <div class="form-text" style="color: var(--text-secondary); font-size: 0.75rem;">Tokeniniz güvende, sadece yerel olarak saklanır.</div>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="autoStartCheck">
                        <label class="form-check-label" style="color: var(--text-secondary);">
                            Oluşturulduktan sonra otomatik başlat
                        </label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal" style="background: transparent; border: 1px solid var(--border-color); color: var(--text-secondary);">İptal</button>
                    <button class="btn btn-accent" onclick="createBot()">Oluştur</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="logsModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-journal-text me-2"></i><span id="logsModalTitle">Loglar</span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="log-area" id="logsContent">Log yükleniyor...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-code-slash me-2"></i><span id="editModalTitle">Kod Düzenle</span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <textarea class="code-editor" id="codeEditor" spellcheck="false"></textarea>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal" style="background: transparent; border: 1px solid var(--border-color); color: var(--text-secondary);">İptal</button>
                    <button class="btn btn-accent" onclick="saveEdit()">Kaydet</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="envModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-key me-2"></i><span id="envModalTitle">Token Düzenle</span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Discord Bot Tokeni</label>
                        <input type="password" class="form-control" id="editToken" placeholder="Yeni token">
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal" style="background: transparent; border: 1px solid var(--border-color); color: var(--text-secondary);">İptal</button>
                    <button class="btn btn-accent" onclick="saveEnv()">Kaydet</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentBot = null;
        let botsData = {};

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const colors = { success: 'var(--success)', error: 'var(--danger)', warning: 'var(--warning)' };
            const icons = { success: 'bi-check-circle', error: 'bi-x-circle', warning: 'bi-exclamation-triangle' };
            const toast = document.createElement('div');
            toast.className = 'toast show';
            toast.innerHTML = `
                <div class="toast-body d-flex align-items-center gap-2">
                    <i class="bi ${icons[type] || icons.success}" style="color: ${colors[type] || colors.success}"></i>
                    <span>${message}</span>
                    <button type="button" class="btn-close btn-close-white ms-auto" onclick="this.parentElement.parentElement.remove()"></button>
                </div>
            `;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        function formatUptime(seconds) {
            if (!seconds) return '-';
            const d = Math.floor(seconds / 86400);
            const h = Math.floor((seconds % 86400) / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            const parts = [];
            if (d > 0) parts.push(d + 'g');
            if (h > 0) parts.push(h + 's');
            if (m > 0) parts.push(m + 'd');
            parts.push(s + 'sn');
            return parts.join(' ');
        }

        function getStatusBadge(status) {
            if (status === 'running') return '<span class="status-badge status-running"><i class="bi bi-play-fill"></i> Çalışıyor</span>';
            if (status === 'stopped') return '<span class="status-badge status-stopped"><i class="bi bi-stop-fill"></i> Durduruldu</span>';
            return '<span class="status-badge status-error"><i class="bi bi-exclamation-triangle"></i> Hata</span>';
        }

        function renderBots(bots) {
            botsData = bots;
            const container = document.getElementById('botList');
            const names = Object.keys(bots);

            let totalRam = 0, active = 0, stopped = 0;
            names.forEach(n => {
                const b = bots[n];
                if (!b) return;
                totalRam += b.memory_mb || 0;
                if (b.status === 'running') active++;
                else if (b.status === 'stopped') stopped++;
            });

            document.getElementById('totalBots').textContent = names.length;
            document.getElementById('activeBots').textContent = active;
            document.getElementById('stoppedBots').textContent = stopped;
            document.getElementById('totalRam').textContent = totalRam.toFixed(1) + ' MB';
            document.getElementById('botCount').textContent = names.length + ' bot';

            if (names.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-robot text-secondary"></i>
                        <h5>Henüz bot bulunmuyor</h5>
                        <p class="text-secondary">Yeni bir bot oluşturarak başlayın.</p>
                        <button class="btn btn-accent" onclick="showCreateModal()">
                            <i class="bi bi-plus-lg"></i> İlk Botu Oluştur
                        </button>
                    </div>
                `;
                return;
            }

            let html = '';
            names.forEach(name => {
                const b = bots[name];
                if (!b) return;
                const status = b.status || 'stopped';
                html += `
                    <div class="bot-card" id="bot-${name}">
                        <div class="bot-header">
                            <div class="d-flex align-items-center gap-2">
                                <span class="bot-name">${name}</span>
                                ${getStatusBadge(status)}
                            </div>
                            <small class="text-secondary" style="font-size: 0.75rem;">PID: ${b.pid || '-'}</small>
                        </div>
                        <div class="bot-metrics">
                            <div class="metric">
                                <div class="metric-value" style="color: var(--success);">${b.memory_mb ? b.memory_mb.toFixed(1) + ' MB' : '-'}</div>
                                <div class="metric-label">RAM</div>
                            </div>
                            <div class="metric">
                                <div class="metric-value">${b.cpu_percent ? b.cpu_percent.toFixed(1) + '%' : '-'}</div>
                                <div class="metric-label">CPU</div>
                            </div>
                            <div class="metric">
                                <div class="metric-value">${b.storage_mb ? b.storage_mb.toFixed(1) + ' MB' : '-'}</div>
                                <div class="metric-label">Depolama</div>
                            </div>
                            <div class="metric">
                                <div class="metric-value">${formatUptime(b.uptime_seconds)}</div>
                                <div class="metric-label">Aktif Süresi</div>
                            </div>
                        </div>
                        <div class="bot-actions">
                            ${status === 'running'
                                ? `<button class="action-btn text-warning" onclick="actionBot('${name}', 'restart')"><i class="bi bi-arrow-repeat"></i> Yeniden Başlat</button>
                                   <button class="action-btn text-danger" onclick="actionBot('${name}', 'stop')"><i class="bi bi-stop-fill"></i> Durdur</button>`
                                : `<button class="action-btn text-success" onclick="actionBot('${name}', 'start')"><i class="bi bi-play-fill"></i> Başlat</button>`
                            }
                            <button class="action-btn" onclick="showLogs('${name}')"><i class="bi bi-journal-text"></i> Loglar</button>
                            <button class="action-btn" onclick="showEdit('${name}')"><i class="bi bi-pencil"></i> Düzenle</button>
                            <button class="action-btn" onclick="showEnv('${name}')"><i class="bi bi-key"></i> Token</button>
                            <button class="action-btn" onclick="gitPush('${name}')"><i class="bi bi-git"></i> Git Push</button>
                            <button class="action-btn text-danger" onclick="deleteBot('${name}')"><i class="bi bi-trash"></i> Sil</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function loadBots() {
            fetch('/api/bots')
                .then(r => r.json())
                .then(data => renderBots(data.bots || {}))
                .catch(() => showToast('Botlar yüklenirken hata oluştu', 'error'));
        }

        function actionBot(name, action) {
            fetch(`/api/bots/${name}/${action}`, { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    showToast(data.message, data.success ? 'success' : 'error');
                    if (data.success) loadBots();
                })
                .catch(() => showToast('İşlem başarısız', 'error'));
        }

        function showCreateModal() {
            document.getElementById('newBotName').value = '';
            document.getElementById('newBotToken').value = '';
            document.getElementById('autoStartCheck').checked = false;
            new bootstrap.Modal(document.getElementById('createModal')).show();
        }

        function createBot() {
            const name = document.getElementById('newBotName').value.trim();
            const token = document.getElementById('newBotToken').value.trim();
            const autoStart = document.getElementById('autoStartCheck').checked;
            if (!name || !token) {
                showToast('İsim ve token gerekli', 'error');
                return;
            }
            fetch('/api/bots', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, token, auto_start: autoStart })
            })
                .then(r => r.json())
                .then(data => {
                    showToast(data.message, data.success ? 'success' : 'error');
                    if (data.success) {
                        bootstrap.Modal.getInstance(document.getElementById('createModal')).hide();
                        loadBots();
                    }
                })
                .catch(() => showToast('Bot oluşturulamadı', 'error'));
        }

        function deleteBot(name) {
            if (!confirm(`"${name}" botunu silmek istediğinize emin misiniz?`)) return;
            fetch(`/api/bots/${name}`, { method: 'DELETE' })
                .then(r => r.json())
                .then(data => {
                    showToast(data.message, data.success ? 'success' : 'error');
                    if (data.success) loadBots();
                });
        }

        function showLogs(name) {
            document.getElementById('logsModalTitle').textContent = `${name} - Loglar`;
            document.getElementById('logsContent').textContent = 'Yükleniyor...';
            const modal = new bootstrap.Modal(document.getElementById('logsModal'));
            modal.show();
            fetch(`/api/bots/${name}/logs?lines=100`)
                .then(r => r.json())
                .then(data => {
                    const logs = data.logs || [];
                    document.getElementById('logsContent').textContent = logs.join('\n') || '(log yok)';
                })
                .catch(() => document.getElementById('logsContent').textContent = 'Loglar yüklenemedi');
        }

        function showEdit(name) {
            currentBot = name;
            document.getElementById('editModalTitle').textContent = `${name} - Kod Düzenle`;
            document.getElementById('codeEditor').value = 'Yükleniyor...';
            const modal = new bootstrap.Modal(document.getElementById('editModal'));
            modal.show();
            fetch(`/api/bots/${name}/edit`)
                .then(r => r.json())
                .then(data => {
                    document.getElementById('codeEditor').value = data.content || '';
                })
                .catch(() => {
                    document.getElementById('codeEditor').value = 'Kod yüklenemedi';
                });
        }

        function saveEdit() {
            if (!currentBot) return;
            const content = document.getElementById('codeEditor').value;
            fetch(`/api/bots/${currentBot}/edit`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content })
            })
                .then(r => r.json())
                .then(data => {
                    showToast(data.message, data.success ? 'success' : 'error');
                    if (data.success) bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
                });
        }

        function showEnv(name) {
            currentBot = name;
            document.getElementById('envModalTitle').textContent = `${name} - Token Düzenle`;
            document.getElementById('editToken').value = '';
            new bootstrap.Modal(document.getElementById('envModal')).show();
        }

        function saveEnv() {
            if (!currentBot) return;
            const token = document.getElementById('editToken').value.trim();
            if (!token) { showToast('Token gerekli', 'error'); return; }
            fetch(`/api/bots/${currentBot}/env`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token })
            })
                .then(r => r.json())
                .then(data => {
                    showToast(data.message, data.success ? 'success' : 'error');
                    if (data.success) bootstrap.Modal.getInstance(document.getElementById('envModal')).hide();
                });
        }

        function gitPush(name) {
            const msg = prompt('Commit mesajı (opsiyonel):');
            const body = msg ? JSON.stringify({ message: msg }) : '{}';
            fetch(`/api/bots/${name}/git-push`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body
            })
                .then(r => r.json())
                .then(data => showToast(data.message, data.success ? 'success' : 'error'));
        }

        loadBots();
        setInterval(loadBots, 5000);
    </script>
</body>
</html>
