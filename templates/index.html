<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f0f1a;
            --bg-card: #1a1a2e;
            --bg-card-hover: #222244;
            --accent: #6c5ce7;
            --accent-glow: rgba(108, 92, 231, 0.15);
            --text-primary: #e8e8f0;
            --text-secondary: #8888aa;
            --border-color: #2a2a4a;
            --success: #00d68f;
            --danger: #ff6b6b;
            --warning: #ffd93d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        .navbar {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 0.75rem 0;
        }

        .navbar-brand {
            color: var(--accent);
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: -0.5px;
        }

        .navbar-brand i { margin-right: 8px; }

        .navbar .badge {
            background: var(--accent);
            color: white;
            font-weight: 500;
        }

        .container-fluid { max-width: 1400px; }

        .btn-accent {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-accent:hover {
            background: #7c6cf7;
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn-outline-accent {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
        }

        .btn-outline-accent:hover {
            background: var(--accent);
            color: white;
        }

        .btn-sm { padding: 0.3rem 0.8rem; font-size: 0.85rem; }

        .lang-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .lang-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .stats-bar {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.2rem 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .stat-item i {
            font-size: 1.5rem;
            color: var(--accent);
        }

        .stat-item .stat-label {
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-item .stat-value {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .bot-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.25rem;
            transition: all 0.2s;
            margin-bottom: 1rem;
        }

        .bot-card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .bot-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .bot-name {
            font-size: 1.15rem;
            font-weight: 600;
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .status-running {
            background: rgba(0, 214, 143, 0.1);
            color: var(--success);
            border: 1px solid rgba(0, 214, 143, 0.3);
        }

        .status-stopped {
            background: rgba(255, 107, 107, 0.1);
            color: var(--danger);
            border: 1px solid rgba(255, 107, 107, 0.3);
        }

        .status-error {
            background: rgba(255, 217, 61, 0.1);
            color: var(--warning);
            border: 1px solid rgba(255, 217, 61, 0.3);
        }

        .bot-metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 0.75rem;
            margin: 0.75rem 0;
        }

        .metric {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 0.5rem 0.75rem;
            text-align: center;
        }

        .metric .metric-value {
            font-size: 1rem;
            font-weight: 600;
        }

        .metric .metric-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .bot-actions {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border-color);
        }

        .action-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 0.35rem 0.7rem;
            border-radius: 6px;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .action-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-glow);
        }

        .action-btn.text-danger:hover {
            border-color: var(--danger);
            color: var(--danger);
            background: rgba(255, 107, 107, 0.1);
        }

        .action-btn.text-success:hover {
            border-color: var(--success);
            color: var(--success);
            background: rgba(0, 214, 143, 0.1);
        }

        .action-btn.text-warning:hover {
            border-color: var(--warning);
            color: var(--warning);
            background: rgba(255, 217, 61, 0.1);
        }

        .modal-content {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .modal-header {
            border-bottom: 1px solid var(--border-color);
        }

        .modal-footer {
            border-top: 1px solid var(--border-color);
        }

        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 8px;
        }

        .form-control:focus, .form-select:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-glow);
            color: var(--text-primary);
        }

        .form-control::placeholder {
            color: var(--text-secondary);
        }

        .form-label { color: var(--text-secondary); font-size: 0.85rem; }

        .modal .btn-close {
            filter: invert(1) brightness(0.5);
        }

        .log-area {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.8rem;
            line-height: 1.6;
            white-space: pre-wrap;
            color: var(--text-secondary);
        }

        .code-editor {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.85rem;
            line-height: 1.6;
            color: var(--text-primary);
            min-height: 300px;
            width: 100%;
            resize: vertical;
        }

        .toast-container {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            z-index: 1060;
        }

        .toast {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .drop-zone {
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            padding: 2rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255,255,255,0.02);
        }

        .drop-zone:hover,
        .drop-zone.dragover {
            border-color: var(--accent);
            background: var(--accent-glow);
        }

        .drop-zone i {
            font-size: 2rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .drop-zone .file-name {
            font-size: 0.8rem;
            color: var(--accent);
            margin-top: 0.5rem;
        }

        .source-badge {
            font-size: 0.65rem;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .source-template {
            background: rgba(108, 92, 231, 0.15);
            color: var(--accent);
            border: 1px solid rgba(108, 92, 231, 0.3);
        }

        .source-imported {
            background: rgba(0, 214, 143, 0.1);
            color: var(--success);
            border: 1px solid rgba(0, 214, 143, 0.3);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container-fluid">
            <span class="navbar-brand"><i class="bi bi-robot"></i> Bot Manager</span>
            <div class="d-flex align-items-center gap-3">
                <span class="badge" id="botCount">0 bots</span>
                <button class="lang-btn" id="langToggle" onclick="toggleLang()">TR</button>
                <button class="btn btn-outline-accent btn-sm" onclick="showImportModal()">
                    <i class="bi bi-upload"></i> <span data-i18n="importBotBtn">Import Bot</span>
                </button>
                <button class="btn btn-accent btn-sm" onclick="showCreateModal()">
                    <i class="bi bi-plus-lg"></i> <span data-i18n="newBotBtn">New Bot</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-3">
        <div class="stats-bar" id="statsBar">
            <div class="stat-item">
                <i class="bi bi-boxes"></i>
                <div>
                    <div class="stat-label" data-i18n="totalBots">TOTAL BOTS</div>
                    <div class="stat-value" id="totalBots">0</div>
                </div>
            </div>
            <div class="stat-item">
                <i class="bi bi-play-circle" style="color: var(--success);"></i>
                <div>
                    <div class="stat-label" data-i18n="active">ACTIVE</div>
                    <div class="stat-value" id="activeBots">0</div>
                </div>
            </div>
            <div class="stat-item">
                <i class="bi bi-stop-circle" style="color: var(--danger);"></i>
                <div>
                    <div class="stat-label" data-i18n="stopped">STOPPED</div>
                    <div class="stat-value" id="stoppedBots">0</div>
                </div>
            </div>
            <div class="stat-item">
                <i class="bi bi-memory" style="color: var(--warning);"></i>
                <div>
                    <div class="stat-label" data-i18n="totalRam">TOTAL RAM</div>
                    <div class="stat-value" id="totalRam">0 MB</div>
                </div>
            </div>
        </div>

        <div id="botList"></div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <div class="modal fade" id="createModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-plus-circle me-2"></i><span data-i18n="createTitle">Create New Bot</span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label" data-i18n="botName">Bot Name</label>
                        <input type="text" class="form-control" id="newBotName" placeholder="e.g. moderation-bot">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" data-i18n="botToken">Discord Bot Token</label>
                        <input type="password" class="form-control" id="newBotToken" placeholder="MTE4...">
                        <div class="form-text" style="color: var(--text-secondary); font-size: 0.75rem;" data-i18n="tokenSafe">Your token is safe, stored locally only.</div>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="autoStartCheck">
                        <label class="form-check-label" style="color: var(--text-secondary);" data-i18n="autoStart">Auto start after creation</label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal" style="background: transparent; border: 1px solid var(--border-color); color: var(--text-secondary);" data-i18n="cancel">Cancel</button>
                    <button class="btn btn-accent" onclick="createBot()" data-i18n="create">Create</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="logsModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-journal-text me-2"></i><span id="logsModalTitle"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="log-area" id="logsContent"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-code-slash me-2"></i><span id="editModalTitle"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <textarea class="code-editor" id="codeEditor" spellcheck="false"></textarea>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal" style="background: transparent; border: 1px solid var(--border-color); color: var(--text-secondary);" data-i18n="cancel">Cancel</button>
                    <button class="btn btn-accent" onclick="saveEdit()" data-i18n="save">Save</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="importModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-upload me-2"></i><span data-i18n="importTitle">Import Bot</span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label" data-i18n="botName">Bot Name</label>
                        <input type="text" class="form-control" id="importBotName" placeholder="e.g. my-custom-bot">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" data-i18n="importBotFile">Bot Python File (.py)</label>
                        <div class="drop-zone" id="importDropZone" onclick="document.getElementById('importBotFile').click()">
                            <i class="bi bi-cloud-upload"></i>
                            <div data-i18n="dropHere">Drop .py file here or click to browse</div>
                            <div class="file-name" id="importFileName"></div>
                        </div>
                        <input type="file" class="d-none" id="importBotFile" accept=".py" onchange="updateFileName(this, 'importFileName')">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" data-i18n="importReqFile">Requirements File (optional, .txt)</label>
                        <div class="drop-zone" id="reqDropZone" onclick="document.getElementById('importReqFile').click()" style="padding: 1rem;">
                            <div data-i18n="dropHereReq">Drop .txt or click to browse</div>
                            <div class="file-name" id="reqFileName"></div>
                        </div>
                        <input type="file" class="d-none" id="importReqFile" accept=".txt" onchange="updateFileName(this, 'reqFileName')">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" data-i18n="botTokenOptional">Discord Bot Token (optional)</label>
                        <input type="password" class="form-control" id="importBotToken" placeholder="MTE4...">
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal" style="background: transparent; border: 1px solid var(--border-color); color: var(--text-secondary);" data-i18n="cancel">Cancel</button>
                    <button class="btn btn-accent" onclick="importBot()" data-i18n="importBtn">Import</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="replaceFileModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-arrow-repeat me-2"></i><span id="replaceModalTitle"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label" data-i18n="importBotFile">Bot Python File (.py)</label>
                        <div class="drop-zone" id="replaceDropZone" onclick="document.getElementById('replaceBotFile').click()">
                            <i class="bi bi-cloud-upload"></i>
                            <div data-i18n="dropHere">Drop .py file here or click to browse</div>
                            <div class="file-name" id="replaceFileName"></div>
                        </div>
                        <input type="file" class="d-none" id="replaceBotFile" accept=".py" onchange="updateFileName(this, 'replaceFileName')">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" data-i18n="importReqFile">Requirements File (optional, .txt)</label>
                        <div class="drop-zone" onclick="document.getElementById('replaceReqFile').click()" style="padding: 1rem;">
                            <div data-i18n="dropHereReq">Drop .txt or click to browse</div>
                            <div class="file-name" id="replaceReqFileName"></div>
                        </div>
                        <input type="file" class="d-none" id="replaceReqFile" accept=".txt" onchange="updateFileName(this, 'replaceReqFileName')">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" data-i18n="botTokenOptional">Discord Bot Token (optional)</label>
                        <input type="password" class="form-control" id="replaceBotToken" placeholder="Leave empty to keep current">
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal" style="background: transparent; border: 1px solid var(--border-color); color: var(--text-secondary);" data-i18n="cancel">Cancel</button>
                    <button class="btn btn-accent" onclick="replaceBotFile()" data-i18n="replaceBtn">Replace</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="envModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-key me-2"></i><span id="envModalTitle"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label" data-i18n="botToken">Discord Bot Token</label>
                        <input type="password" class="form-control" id="editToken" placeholder="New token">
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal" style="background: transparent; border: 1px solid var(--border-color); color: var(--text-secondary);" data-i18n="cancel">Cancel</button>
                    <button class="btn btn-accent" onclick="saveEnv()" data-i18n="save">Save</button>
                </div>
            </div>
        </div>
    </div>

                autoStart: 'Oluşturulduktan sonra otomatik başlat',
                cancel: 'İptal',
                create: 'Oluştur',
                save: 'Kaydet',
                logs: 'Loglar',
                editCode: 'Kod Düzenle',
                editToken: 'Token Düzenle',
                loading: 'Yükleniyor...',
                noLogs: '(log yok)',
                failedLoadLogs: 'Loglar yüklenemedi',
                failedLoadCode: 'Kod yüklenemedi',
                running: 'Çalışıyor',
                stopped_status: 'Durduruldu',
                error: 'Hata',
                restart: 'Yeniden Başlat',
                stop: 'Durdur',
                start: 'Başlat',
                logsBtn: 'Loglar',
                edit: 'Düzenle',
                token: 'Token',
                gitPush: 'Git Push',
                addToServer: 'Sunucuya Ekle',
                delete: 'Sil',
                importBotBtn: 'Bot İçe Aktar',
                importTitle: 'Bot İçe Aktar',
                importBotFile: 'Bot Python Dosyası (.py)',
                importReqFile: 'Requirements Dosyası (opsiyonel, .txt)',
                importBtn: 'İçe Aktar',
                replaceBtn: 'Değiştir',
                replaceFile: 'Dosya Değiştir',
                dropHere: '.py dosyasını buraya bırakın veya tıklayın',
                dropHereReq: '.txt dosyasını buraya bırakın veya tıklayın',
                botTokenOptional: 'Discord Bot Tokeni (opsiyonel)',
                sourceTemplate: 'ŞABLON',
                sourceImported: 'İÇE AKTARILDI',
                ram: 'RAM',
                cpu: 'CPU',
                storage: 'DEPOLAMA',
                uptime: 'AKTİF SÜRESİ',
                noBots: 'Henüz bot bulunmuyor',
                noBotsDesc: 'Yeni bir bot oluşturarak başlayın.',
                createFirst: 'İlk Botu Oluştur',
                failedLoadBots: 'Botlar yüklenirken hata oluştu',
                actionFailed: 'İşlem başarısız',
                nameTokenRequired: 'İsim ve token gerekli',
                failedCreateBot: 'Bot oluşturulamadı',
                tokenRequired: 'Token gerekli',
                commitMsg: 'Commit mesajı (opsiyonel):',
                confirmDelete: '"{name}" botunu silmek istediğinize emin misiniz?',
                botCount: '{n} bot',
                day: 'g',
                hour: 's',
                min: 'd',
                sec: 'sn',
                pid: 'PID',
            }
        };

        let currentLang = localStorage.getItem('botManagerLang') || 'en';
        let currentBot = null;
        let botsData = {};

        function t(key, vars = {}) {
            let val = LANG[currentLang][key] || LANG['en'][key] || key;
            for (const [k, v] of Object.entries(vars)) {
                val = val.replace(`{${k}}`, v);
            }
            return val;
        }

        function applyLang() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                el.textContent = t(key);
            });
            document.getElementById('langToggle').textContent = currentLang === 'en' ? 'TR' : 'EN';
            if (Object.keys(botsData).length > 0) renderBots(botsData);
            const empty = document.querySelector('.empty-state');
            if (empty) renderBots(botsData);
        }

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'tr' : 'en';
            localStorage.setItem('botManagerLang', currentLang);
            applyLang();
            updateDynamicTexts();
        }

        function updateDynamicTexts() {
            const names = Object.keys(botsData);
            document.getElementById('botCount').textContent = t('botCount', { n: names.length });
            const emptyTitle = document.querySelector('.empty-state h5');
            const emptyDesc = document.querySelector('.empty-state p');
            const emptyBtn = document.querySelector('.empty-state .btn');
            if (emptyTitle) emptyTitle.textContent = t('noBots');
            if (emptyDesc) emptyDesc.textContent = t('noBotsDesc');
            if (emptyBtn) emptyBtn.innerHTML = `<i class="bi bi-plus-lg"></i> ${t('createFirst')}`;
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const colors = { success: 'var(--success)', error: 'var(--danger)', warning: 'var(--warning)' };
            const icons = { success: 'bi-check-circle', error: 'bi-x-circle', warning: 'bi-exclamation-triangle' };
            const toast = document.createElement('div');
            toast.className = 'toast show';
            toast.innerHTML = `
                <div class="toast-body d-flex align-items-center gap-2">
                    <i class="bi ${icons[type] || icons.success}" style="color: ${colors[type] || colors.success}"></i>
                    <span>${message}</span>
                    <button type="button" class="btn-close btn-close-white ms-auto" onclick="this.parentElement.parentElement.remove()"></button>
                </div>
            `;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        function formatUptime(seconds) {
            if (!seconds) return '-';
            const d = Math.floor(seconds / 86400);
            const h = Math.floor((seconds % 86400) / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            const parts = [];
            if (d > 0) parts.push(d + t('day'));
            if (h > 0) parts.push(h + t('hour'));
            if (m > 0) parts.push(m + t('min'));
            parts.push(s + t('sec'));
            return parts.join(' ');
        }

        function getSourceBadge(source) {
            if (source === 'imported') return `<span class="source-badge source-imported">${t('sourceImported')}</span>`;
            return `<span class="source-badge source-template">${t('sourceTemplate')}</span>`;
        }

        function updateFileName(input, displayId) {
            const name = input.files[0] ? input.files[0].name : '';
            document.getElementById(displayId).textContent = name;
        }

        function setupDropZone(zoneId, inputId) {
            const zone = document.getElementById(zoneId);
            const input = document.getElementById(inputId);
            if (!zone || !input) return;
            zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
            zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
            zone.addEventListener('drop', e => {
                e.preventDefault();
                zone.classList.remove('dragover');
                if (e.dataTransfer.files.length) {
                    input.files = e.dataTransfer.files;
                    updateFileName(input, zoneId === 'importDropZone' ? 'importFileName' : zoneId === 'replaceDropZone' ? 'replaceFileName' : 'reqFileName');
                }
            });
        }

        function getStatusBadge(status) {
            if (status === 'running') return `<span class="status-badge status-running"><i class="bi bi-play-fill"></i> ${t('running')}</span>`;
            if (status === 'stopped') return `<span class="status-badge status-stopped"><i class="bi bi-stop-fill"></i> ${t('stopped_status')}</span>`;
            return `<span class="status-badge status-error"><i class="bi bi-exclamation-triangle"></i> ${t('error')}</span>`;
        }

        function renderBots(bots) {
            botsData = bots;
            const container = document.getElementById('botList');
            const names = Object.keys(bots);

            let totalRam = 0, active = 0, stopped = 0;
            names.forEach(n => {
                const b = bots[n];
                if (!b) return;
                totalRam += b.memory_mb || 0;
                if (b.status === 'running') active++;
                else if (b.status === 'stopped') stopped++;
            });

            document.getElementById('totalBots').textContent = names.length;
            document.getElementById('activeBots').textContent = active;
            document.getElementById('stoppedBots').textContent = stopped;
            document.getElementById('totalRam').textContent = totalRam.toFixed(1) + ' MB';
            document.getElementById('botCount').textContent = t('botCount', { n: names.length });

            if (names.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-robot text-secondary"></i>
                        <h5>${t('noBots')}</h5>
                        <p class="text-secondary">${t('noBotsDesc')}</p>
                        <button class="btn btn-accent" onclick="showCreateModal()">
                            <i class="bi bi-plus-lg"></i> ${t('createFirst')}
                        </button>
                    </div>
                `;
                return;
            }

            let html = '';
            names.forEach(name => {
                const b = bots[name];
                if (!b) return;
                const status = b.status || 'stopped';
                html += `
                    <div class="bot-card" id="bot-${name}">
                        <div class="bot-header">
                            <div class="d-flex align-items-center gap-2">
                                <span class="bot-name">${name}</span>
                                ${getSourceBadge(b.source)}
                                ${getStatusBadge(status)}
                            </div>
                            <small class="text-secondary" style="font-size: 0.75rem;">${t('pid')}: ${b.pid || '-'}</small>
                        </div>
                        <div class="bot-metrics">
                            <div class="metric">
                                <div class="metric-value" style="color: var(--success);">${b.memory_mb ? b.memory_mb.toFixed(1) + ' MB' : '-'}</div>
                                <div class="metric-label">${t('ram')}</div>
                            </div>
                            <div class="metric">
                                <div class="metric-value">${b.cpu_percent ? b.cpu_percent.toFixed(1) + '%' : '-'}</div>
                                <div class="metric-label">${t('cpu')}</div>
                            </div>
                            <div class="metric">
                                <div class="metric-value">${b.storage_mb ? b.storage_mb.toFixed(1) + ' MB' : '-'}</div>
                                <div class="metric-label">${t('storage')}</div>
                            </div>
                            <div class="metric">
                                <div class="metric-value">${formatUptime(b.uptime_seconds)}</div>
                                <div class="metric-label">${t('uptime')}</div>
                            </div>
                        </div>
                        <div class="bot-actions">
                            ${status === 'running'
                                ? `<button class="action-btn text-warning" onclick="actionBot('${name}', 'restart')"><i class="bi bi-arrow-repeat"></i> ${t('restart')}</button>
                                   <button class="action-btn text-danger" onclick="actionBot('${name}', 'stop')"><i class="bi bi-stop-fill"></i> ${t('stop')}</button>`
                                : `<button class="action-btn text-success" onclick="actionBot('${name}', 'start')"><i class="bi bi-play-fill"></i> ${t('start')}</button>`
                            }
                            <button class="action-btn" onclick="showLogs('${name}')"><i class="bi bi-journal-text"></i> ${t('logsBtn')}</button>
                            <button class="action-btn" onclick="showEdit('${name}')"><i class="bi bi-pencil"></i> ${t('edit')}</button>
                            <button class="action-btn" onclick="showReplaceFile('${name}')"><i class="bi bi-upload"></i> ${t('replaceFile')}</button>
                            ${b.token ? `<button class="action-btn text-info" onclick="addToServer('${name}')"><i class="bi bi-box-arrow-up-right"></i> ${t('addToServer')}</button>` : ''}
                            <button class="action-btn" onclick="showEnv('${name}')"><i class="bi bi-key"></i> ${t('token')}</button>
                            <button class="action-btn" onclick="gitPush('${name}')"><i class="bi bi-git"></i> ${t('gitPush')}</button>
                            <button class="action-btn text-danger" onclick="deleteBot('${name}')"><i class="bi bi-trash"></i> ${t('delete')}</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function loadBots() {
            fetch('/api/bots')
                .then(r => r.json())
                .then(data => renderBots(data.bots || {}))
                .catch(() => showToast(t('failedLoadBots'), 'error'));
        }

        function actionBot(name, action) {
            fetch(`/api/bots/${name}/${action}`, { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    showToast(data.message, data.success ? 'success' : 'error');
                    if (data.success) loadBots();
                })
                .catch(() => showToast(t('actionFailed'), 'error'));
        }

        function showCreateModal() {
            document.getElementById('newBotName').value = '';
            document.getElementById('newBotToken').value = '';
            document.getElementById('autoStartCheck').checked = false;
            new bootstrap.Modal(document.getElementById('createModal')).show();
        }

        function createBot() {
            const name = document.getElementById('newBotName').value.trim();
            const token = document.getElementById('newBotToken').value.trim();
            const autoStart = document.getElementById('autoStartCheck').checked;
            if (!name || !token) {
                showToast(t('nameTokenRequired'), 'error');
                return;
            }
            fetch('/api/bots', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, token, auto_start: autoStart })
            })
                .then(r => r.json())
                .then(data => {
                    showToast(data.message, data.success ? 'success' : 'error');
                    if (data.success) {
                        bootstrap.Modal.getInstance(document.getElementById('createModal')).hide();
                        loadBots();
                    }
                })
                .catch(() => showToast(t('failedCreateBot'), 'error'));
        }

        function deleteBot(name) {
            if (!confirm(t('confirmDelete', { name }))) return;
            fetch(`/api/bots/${name}`, { method: 'DELETE' })
                .then(r => r.json())
                .then(data => {
                    showToast(data.message, data.success ? 'success' : 'error');
                    if (data.success) loadBots();
                });
        }

        function showLogs(name) {
            document.getElementById('logsModalTitle').textContent = `${name} - ${t('logs')}`;
            document.getElementById('logsContent').textContent = t('loading');
            const modal = new bootstrap.Modal(document.getElementById('logsModal'));
            modal.show();
            fetch(`/api/bots/${name}/logs?lines=100`)
                .then(r => r.json())
                .then(data => {
                    const logs = data.logs || [];
                    document.getElementById('logsContent').textContent = logs.join('\n') || t('noLogs');
                })
                .catch(() => document.getElementById('logsContent').textContent = t('failedLoadLogs'));
        }

        function showEdit(name) {
            currentBot = name;
            document.getElementById('editModalTitle').textContent = `${name} - ${t('editCode')}`;
            document.getElementById('codeEditor').value = t('loading');
            const modal = new bootstrap.Modal(document.getElementById('editModal'));
            modal.show();
            fetch(`/api/bots/${name}/edit`)
                .then(r => r.json())
                .then(data => {
                    document.getElementById('codeEditor').value = data.content || '';
                })
                .catch(() => {
                    document.getElementById('codeEditor').value = t('failedLoadCode');
                });
        }

        function saveEdit() {
            if (!currentBot) return;
            const content = document.getElementById('codeEditor').value;
            fetch(`/api/bots/${currentBot}/edit`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content })
            })
                .then(r => r.json())
                .then(data => {
                    showToast(data.message, data.success ? 'success' : 'error');
                    if (data.success) bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
                });
        }

        function showEnv(name) {
            currentBot = name;
            document.getElementById('envModalTitle').textContent = `${name} - ${t('editToken')}`;
            document.getElementById('editToken').value = '';
            new bootstrap.Modal(document.getElementById('envModal')).show();
        }

        function saveEnv() {
            if (!currentBot) return;
            const token = document.getElementById('editToken').value.trim();
            if (!token) { showToast(t('tokenRequired'), 'error'); return; }
            fetch(`/api/bots/${currentBot}/env`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token })
            })
                .then(r => r.json())
                .then(data => {
                    showToast(data.message, data.success ? 'success' : 'error');
                    if (data.success) bootstrap.Modal.getInstance(document.getElementById('envModal')).hide();
                });
        }

        function showImportModal() {
            document.getElementById('importBotName').value = '';
            document.getElementById('importBotToken').value = '';
            document.getElementById('importBotFile').value = '';
            document.getElementById('importReqFile').value = '';
            new bootstrap.Modal(document.getElementById('importModal')).show();
        }

        function importBot() {
            const name = document.getElementById('importBotName').value.trim();
            const token = document.getElementById('importBotToken').value.trim();
            const botFile = document.getElementById('importBotFile').files[0];
            const reqFile = document.getElementById('importReqFile').files[0];

            if (!name || !botFile) {
                showToast(t('nameTokenRequired'), 'error');
                return;
            }

            const formData = new FormData();
            formData.append('name', name);
            formData.append('token', token);
            formData.append('bot_file', botFile);
            if (reqFile) formData.append('req_file', reqFile);

            fetch('/api/bots/import', {
                method: 'POST',
                body: formData
            })
                .then(r => r.json())
                .then(data => {
                    showToast(data.message, data.success ? 'success' : 'error');
                    if (data.success) {
                        bootstrap.Modal.getInstance(document.getElementById('importModal')).hide();
                        loadBots();
                    }
                })
                .catch(() => showToast(t('failedCreateBot'), 'error'));
        }

        function showReplaceFile(name) {
            currentBot = name;
            document.getElementById('replaceModalTitle').textContent = `${name} - ${t('replaceFile')}`;
            document.getElementById('replaceBotToken').value = '';
            document.getElementById('replaceBotFile').value = '';
            document.getElementById('replaceReqFile').value = '';
            document.getElementById('replaceFileName').textContent = '';
            document.getElementById('replaceReqFileName').textContent = '';
            new bootstrap.Modal(document.getElementById('replaceFileModal')).show();
        }

        function replaceBotFile() {
            if (!currentBot) return;
            const token = document.getElementById('replaceBotToken').value.trim();
            const botFile = document.getElementById('replaceBotFile').files[0];
            const reqFile = document.getElementById('replaceReqFile').files[0];

            if (!botFile) {
                showToast(t('nameTokenRequired'), 'error');
                return;
            }

            const formData = new FormData();
            formData.append('token', token);
            formData.append('bot_file', botFile);
            if (reqFile) formData.append('req_file', reqFile);

            fetch(`/api/bots/${currentBot}/replace-file`, {
                method: 'POST',
                body: formData
            })
                .then(r => r.json())
                .then(data => {
                    showToast(data.message, data.success ? 'success' : 'error');
                    if (data.success) {
                        bootstrap.Modal.getInstance(document.getElementById('replaceFileModal')).hide();
                        loadBots();
                    }
                })
                .catch(() => showToast(t('actionFailed'), 'error'));
        }

        function addToServer(name) {
            fetch(`/api/bots/${name}/invite`)
                .then(r => r.json())
                .then(data => {
                    if (data.url) {
                        window.open(data.url, '_blank');
                    } else {
                        showToast(data.error || 'Failed to generate invite link', 'error');
                    }
                })
                .catch(() => showToast(t('actionFailed'), 'error'));
        }

        function gitPush(name) {
            const msg = prompt(t('commitMsg'));
            const body = msg ? JSON.stringify({ message: msg }) : '{}';
            fetch(`/api/bots/${name}/git-push`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body
            })
                .then(r => r.json())
                .then(data => showToast(data.message, data.success ? 'success' : 'error'));
        }

        applyLang();
        setupDropZone('importDropZone', 'importBotFile');
        setupDropZone('reqDropZone', 'importReqFile');
        setupDropZone('replaceDropZone', 'replaceBotFile');
        loadBots();
        setInterval(loadBots, 5000);
    </script>
</body>
</html>
